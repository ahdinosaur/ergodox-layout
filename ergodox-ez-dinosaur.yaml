# keymap-drawer YAML for the `dinosaur` ergodox_ez layout.
#
# Layer order and per-layer key order mirror the LAYOUT_ergodox(...)
# argument order in `keyboards/ergodox_ez/keymaps/dinosaur/keymap.c`.
# Labels are display strings only; rebuild via `keymap-drawer parse`
# if you change the keymap.
layout:
  qmk_keyboard: ergodox_ez
  layout_name: LAYOUT_ergodox
layers:
  BASE:
    # left hand
    - ["=", "1", "2", "3", "4", "5", Left]
    - [Tab, Q, W, E, R, T, L1]
    - [Esc, A, S, D, F, G]
    - [Shift, Z, X, C, V, B, LMeta]
    - ["`", Ctrl, Alt, Left, Right]
    # left thumb
    - [{t: App, h: Alt}, LMeta]
    - Home
    - [BSpace, Delete, End]
    # right hand
    - [Right, "6", "7", "8", "9", "0", "-"]
    - [L1, Y, U, I, O, P, "\\"]
    - [H, J, K, L, ";", "'"]
    - [RMeta, N, M, ",", ".", {t: "/", h: Ctrl}, Shift]
    - [Up, Down, "[", "]", "~L2"]
    # right thumb
    - [Alt, Ctrl]
    - PgUp
    - [PgDn, Enter, Space]

  SYMB:
    # left hand
    - [Vrsn, F1, F2, F3, F4, F5, ""]
    - ["", "!", "@", "{", "}", "|", ""]
    - ["", "#", "$", "(", ")", "`"]
    - ["", "%", "^", "[", "]", "~", ""]
    - [EE_CLR, "", "", "", ""]
    # left thumb
    - ["", ""]
    - ""
    - ["", "", ""]
    # right hand
    - ["", F6, F7, F8, F9, F10, F11]
    - ["", Up, "7", "8", "9", "*", F12]
    - [Down, "4", "5", "6", "+", ""]
    - ["", "&", "1", "2", "3", "\\", ""]
    - ["", ".", "0", "=", ""]
    # right thumb
    - ["", ""]
    - ""
    - ["", "", ""]

  MDIA:
    # left hand
    - ["", "", "", "", "", "", ""]
    - ["", "", "", MsUp, "", "", ""]
    - ["", "", MsLeft, MsDown, MsRight, ""]
    - ["", "", "", "", "", "", ""]
    - ["", "", "", Lclk, Rclk]
    # left thumb
    - ["", ""]
    - ""
    - ["", "", ""]
    # right hand
    - ["", "", "", "", "", "", ""]
    - ["", "", "", "", "", "", ""]
    - ["", "", "", "", "", Play]
    - ["", "", "", Prev, Next, "", ""]
    - [VolUp, VolDn, Mute, "", ""]
    # right thumb
    - ["", ""]
    - ""
    - ["", "", WBack]
